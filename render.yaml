# One-click deploy blueprint for Render (https://render.com)
# Dashboard → New → Blueprint → pick this repo, and the web app goes live.
services:
  - type: web
    name: hdb-valuation
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-web.txt && pip install -e . --no-deps
    startCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
